  <line x1="7" y1="4.5" x2="7" y2="14"/>
  <!-- Body -->
  <path d="M4 14c-1.5 1-2 3-1.5 4.5S4 21 6 21.5s4-.5 5-2 1-3.5.5-5C11 13 9 12 7 12"/>
  <path d="M3.5 16c1-.5 2.5-.5 3.5 0"/>
